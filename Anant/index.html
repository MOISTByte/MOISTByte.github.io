<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anant Login</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #475467;
      --accent: #1570ef;
      --error: #b42318;
      --ok: #027a48;
      --border: #d0d5dd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 40%, #eef2ff 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(16, 24, 40, 0.12);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.15);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    #msg {
      min-height: 20px;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .error {
      color: var(--error);
    }

    .ok {
      color: var(--ok);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login</h1>
    <p>Enter your username and password.</p>

    <form id="loginForm" autocomplete="off">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Sign In</button>
      <div id="msg" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    function setMessage(text, type) {
      msg.textContent = text;
      msg.className = type;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("./password.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not load password.json");
        }

        const data = await response.json();
        const users = Array.isArray(data.users) ? data.users : [];

        const matchedUser = users.find(
          (user) => user.name === username && user.pass === password
        );

        if (matchedUser) {
          setMessage("Login successful. Redirecting...", "ok");
          window.location.href = "./faaah.html";
          return;
        }

        setMessage("Invalid username or password.", "error");
      } catch (error) {
        setMessage("Error reading password.json", "error");
      }
    });
  </script>
</body>
</html>
